<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaStream</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0f0f0f;
  --bg2:       #171717;
  --bg3:       #1e1e1e;
  --border:    #2a2a2a;
  --orange:    #f47521;
  --orange2:   #ff9244;
  --red:       #e5343a;
  --gold:      #f0c040;
  --white:     #f5f5f5;
  --grey1:     #c0c0c0;
  --grey2:     #808080;
  --grey3:     #3a3a3a;
  --font-head: 'Bebas Neue', sans-serif;
  --font-ui:   'Rajdhani', sans-serif;
  --font-body: 'Noto Sans JP', sans-serif;
  --r:         8px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--white); font-family:var(--font-body); overflow-x:hidden; }
a { text-decoration:none; color:inherit; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--orange); border-radius:3px; }

/* NAV */
nav {
  position:fixed; top:0; left:0; right:0; z-index:900;
  height:58px;
  background:rgba(15,15,15,0.96);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 36px;
}
.logo { display:flex; align-items:center; gap:10px; font-family:var(--font-head); font-size:22px; letter-spacing:3px; }
.logo-icon {
  width:32px; height:32px; background:var(--orange); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:#fff; box-shadow:0 0 14px rgba(244,117,33,0.45);
}
.logo span { color:var(--orange); }
.nav-links { display:flex; gap:28px; list-style:none; }
.nav-links a {
  font-family:var(--font-ui); font-size:14px; font-weight:600;
  letter-spacing:1.5px; text-transform:uppercase; color:var(--grey1); transition:color .2s;
}
.nav-links a:hover, .nav-links a.active { color:var(--orange); }
.nav-search {
  display:flex; align-items:center; gap:8px;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:6px; padding:7px 14px; transition:border-color .2s;
}
.nav-search:focus-within { border-color:var(--orange); }
.nav-search input {
  background:none; border:none; outline:none;
  color:var(--white); font-family:var(--font-ui); font-size:14px; width:190px;
}
.nav-search input::placeholder { color:var(--grey2); }
.nav-search svg { color:var(--grey2); flex-shrink:0; }

/* HERO */
.hero {
  margin-top:58px; height:480px;
  position:relative; overflow:hidden; background:var(--bg2);
}
.hero-bg-img {
  position:absolute; inset:0;
  background-size:cover; background-position:center top;
  filter:blur(3px) brightness(0.3) saturate(1.4);
  transform:scale(1.06);
}
.hero-gradient {
  position:absolute; inset:0;
  background:
    linear-gradient(to right, rgba(15,15,15,0.97) 30%, rgba(15,15,15,0.55) 65%, rgba(15,15,15,0.15) 100%),
    linear-gradient(to top, rgba(15,15,15,0.85) 0%, transparent 55%);
}
.hero-cover-right {
  position:absolute; right:0; top:0; bottom:0; width:52%;
}
.hero-cover-right img {
  width:100%; height:100%; object-fit:cover; object-position:center top; opacity:0.45;
}
.hero-content {
  position:relative; z-index:2; height:100%;
  display:flex; flex-direction:column; justify-content:center;
  padding:0 60px; max-width:640px;
  animation:fadeUp .6s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
.hero-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--orange); color:#fff;
  font-family:var(--font-ui); font-size:11px; font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  padding:4px 12px; border-radius:4px; width:fit-content; margin-bottom:14px;
}
.hero-title {
  font-family:var(--font-head); font-size:clamp(36px,5vw,62px);
  line-height:1; letter-spacing:3px; color:var(--white); margin-bottom:10px;
}
.hero-meta { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
.h-tag {
  font-family:var(--font-ui); font-size:12px; font-weight:600;
  letter-spacing:1px; text-transform:uppercase;
  padding:3px 10px; border-radius:4px;
  border:1px solid var(--border); color:var(--grey2);
}
.h-tag.genre { border-color:rgba(244,117,33,0.4); color:var(--orange); }
.hero-actions { display:flex; gap:10px; }
.btn-play {
  display:flex; align-items:center; gap:8px;
  background:var(--orange); color:#fff; border:none; cursor:pointer;
  font-family:var(--font-ui); font-size:14px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
  padding:11px 24px; border-radius:6px; transition:all .2s;
}
.btn-play:hover { background:var(--orange2); box-shadow:0 0 20px rgba(244,117,33,0.4); transform:translateY(-1px); }

/* MAIN */
main { max-width:1380px; margin:0 auto; padding:38px 32px 60px; }

/* GENRE CHIPS */
.genre-bar { display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:34px; scrollbar-width:none; }
.genre-bar::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; background:var(--bg3); border:1px solid var(--border); color:var(--grey1);
  cursor:pointer; font-family:var(--font-ui); font-size:13px; font-weight:600;
  letter-spacing:1px; text-transform:uppercase; padding:7px 18px; border-radius:20px;
  transition:all .2s; user-select:none;
}
.chip:hover, .chip.active { background:var(--orange); border-color:var(--orange); color:#fff; box-shadow:0 0 12px rgba(244,117,33,0.3); }

/* SECTION HEADER */
.section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
.section-title {
  font-family:var(--font-head); font-size:26px; letter-spacing:2px; color:var(--white);
  display:flex; align-items:center; gap:12px;
}
.section-title::before {
  content:''; display:block; width:4px; height:26px;
  background:var(--orange); border-radius:2px; box-shadow:0 0 8px rgba(244,117,33,0.6);
}
#bookCount { font-family:var(--font-ui); font-size:13px; color:var(--grey2); }

/* ════════════════════════════════
   BOOK GRID + CARDS
════════════════════════════════ */
.book-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(158px,1fr));
  gap:22px;
  margin-bottom:52px;
}

.book-card {
  cursor:pointer;
  animation:fadeUp .45s ease both;
  transition:transform .2s;
}
.book-card:hover { transform:translateY(-6px); }
.book-card:hover .card-overlay { opacity:1; }
.book-card:hover .card-img { filter:brightness(0.62) saturate(1.1); }

.card-thumb {
  position:relative; aspect-ratio:2/3;
  border-radius:var(--r); overflow:hidden;
  background:var(--bg3); margin-bottom:10px;
  box-shadow:0 6px 22px rgba(0,0,0,0.55);
}
.card-img {
  width:100%; height:100%; object-fit:cover; object-position:center top;
  display:block; transition:filter .3s;
}
.card-overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0.55);
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .2s;
}
.overlay-btn {
  width:50px; height:50px; background:var(--orange); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 20px rgba(244,117,33,0.55);
  transform:scale(0.88); transition:transform .2s;
}
.book-card:hover .overlay-btn { transform:scale(1); }

/* BADGES */
.card-badge {
  position:absolute; top:8px; left:8px;
  font-family:var(--font-ui); font-size:10px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
  padding:3px 8px; border-radius:4px; color:#fff;
}
.badge-nouveau { background:var(--red); }
.badge-hot     { background:#d4880a; }
.badge-top     { background:#2563eb; }

.card-title {
  font-family:var(--font-ui); font-size:14px; font-weight:700;
  color:var(--white); line-height:1.3; margin-bottom:4px;
  overflow:hidden; display:-webkit-box;
  -webkit-line-clamp:2; -webkit-box-orient:vertical;
}
.card-genre { font-family:var(--font-ui); font-size:11px; font-weight:600; color:var(--grey2); text-transform:uppercase; letter-spacing:0.5px; }

/* stagger */
.book-card:nth-child(1){animation-delay:.04s} .book-card:nth-child(2){animation-delay:.08s}
.book-card:nth-child(3){animation-delay:.12s} .book-card:nth-child(4){animation-delay:.16s}
.book-card:nth-child(5){animation-delay:.20s} .book-card:nth-child(6){animation-delay:.24s}
.book-card:nth-child(7){animation-delay:.28s} .book-card:nth-child(8){animation-delay:.32s}
.book-card:nth-child(9){animation-delay:.36s} .book-card:nth-child(10){animation-delay:.40s}

/* FOOTER */
footer {
  border-top:1px solid var(--border);
  padding:26px 36px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
}
.footer-logo { font-family:var(--font-head); font-size:18px; letter-spacing:3px; }
.footer-logo span { color:var(--orange); }
.footer-copy { font-family:var(--font-ui); font-size:12px; color:var(--grey3); }

@media(max-width:768px) {
  nav { padding:0 16px; }
  .nav-links { display:none; }
  .hero-content { padding:0 20px; }
  main { padding:28px 16px 48px; }
  .book-grid { grid-template-columns:repeat(auto-fill, minmax(130px,1fr)); gap:14px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <div class="logo-icon">M</div>
    MANGA<span>STREAM</span>
  </div>
  <ul class="nav-links">
    <li><a href="#" class="active">Accueil</a></li>
    <li><a href="#catalogue">Catalogue</a></li>
    <li><a href="#">Nouveautés</a></li>
    <li><a href="#">Populaires</a></li>
  </ul>
  <div class="nav-search">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Rechercher..." oninput="applyFilter()">
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg-img" id="heroBg"></div>
  <div class="hero-gradient"></div>
  <div class="hero-cover-right"><img id="heroCover" src="" alt=""></div>
  <div class="hero-content">
    <div class="hero-badge">⭐ À LA UNE</div>
    <h1 class="hero-title" id="heroTitle">—</h1>
    <div class="hero-meta">
      <span class="h-tag genre" id="heroGenre">—</span>
    </div>
    <div class="hero-actions">
      <button class="btn-play" id="heroBtn" onclick="">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
        Lire maintenant
      </button>
    </div>
  </div>
</section>

<!-- MAIN -->
<main>
  <div class="genre-bar" id="genreBar">
    <div class="chip active" data-genre="all" onclick="filterGenre(this)">Tout</div>
  </div>

  <div class="section-head" id="catalogue">
    <h2 class="section-title">Catalogue</h2>
    <span id="bookCount"></span>
  </div>

  <!-- ╔══════════════════════════════════════════════════════════════════╗
       ║                     LISTE DES LIVRES                           ║
       ║                                                                ║
       ║  Pour ajouter un livre : copier-coller le bloc ci-dessous     ║
       ║  et changer les 4 (ou 5) attributs data-*                     ║
       ║                                                                ║
       ║  data-title   → titre affiché sur la carte                    ║
       ║  data-folder  → nom du dossier dans ton repo GitHub            ║
       ║                 (ex: "yona"  →  repo/yona/ch1/page1.jpg)      ║
       ║  data-cover   → URL de l'image de couverture                  ║
       ║  data-genre   → Shojo | Shonen | Seinen | Webtoon | etc.      ║
       ║  data-badge   → "nouveau" | "hot" | "top" | ""  (laisser vide)║
       ╚══════════════════════════════════════════════════════════════════╝ -->
  <div class="book-grid" id="bookGrid">

    <!-- ── LIVRE 1 ── -->
    <div class="book-card"
      data-title="Yona, Princesse de l'Aube"
      data-folder="meru"
      data-cover="https://imgsrv.crunchyroll.com/cdn-cgi/image/fit=cover,format=auto,quality=85,width=1920/keyart/G6VN35J7R-backdrop_wide"
      data-genre="Shojo"
      data-badge="nouveau">
    </div>

    <!-- ── LIVRE 2 — (exemple, à remplacer) ── -->
    <!--
    <div class="book-card"
      data-title="Titre du manga"
      data-folder="nom-dossier"
      data-cover="https://url-de-ta-cover.jpg"
      data-genre="Shonen"
      data-badge="hot">
    </div>
    -->

  </div>
  <!-- FIN LISTE DES LIVRES -->

</main>

<!-- FOOTER -->
<footer>
  <div class="footer-logo">MANGA<span>STREAM</span></div>
  <span class="footer-copy">© 2026 MangaStream · Plateforme fan non officielle</span>
</footer>

<script>
// ── CONFIG GITHUB ────────────────────────────────────
// Change ces 2 valeurs avec ton compte GitHub
const GITHUB_USER   = 'TON-USERNAME';
const GITHUB_REPO   = 'TON-REPO';

const BADGE_CLASS = { nouveau:'badge-nouveau', hot:'badge-hot', top:'badge-top' };
const BADGE_LABEL = { nouveau:'Nouveau', hot:'🔥 Hot', top:'⭐ Top' };

// ── CONSTRUCTION DES CARTES ──────────────────────────
function buildCards() {
  const cards = document.querySelectorAll('.book-card');
  const genres = new Set();

  cards.forEach(card => {
    const title  = card.dataset.title  || 'Sans titre';
    const folder = card.dataset.folder || '';
    const cover  = card.dataset.cover  || '';
    const genre  = card.dataset.genre  || 'Autre';
    const badge  = card.dataset.badge  || '';
    genres.add(genre);

    const badgeHTML = (badge && BADGE_CLASS[badge])
      ? `<div class="card-badge ${BADGE_CLASS[badge]}">${BADGE_LABEL[badge]}</div>` : '';

    card.innerHTML = `
      <div class="card-thumb">
        <img class="card-img" src="${cover}" alt="${title}" loading="lazy">
        ${badgeHTML}
        <div class="card-overlay">
          <div class="overlay-btn">
            <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg>
          </div>
        </div>
      </div>
      <div class="card-title">${title}</div>
      <div class="card-genre">${genre}</div>`;

    // Redirige vers le lecteur avec le dossier du livre
    const readerUrl = `reader.html?folder=${encodeURIComponent(folder)}&title=${encodeURIComponent(title)}`;
    card.addEventListener('click', () => window.location.href = readerUrl);
  });

  buildGenreChips([...genres].sort());
  updateHero();
  updateCount();
}

// ── HERO (prend le 1er livre) ────────────────────────
function updateHero() {
  const first = document.querySelector('.book-card');
  if (!first) return;
  const title  = first.dataset.title  || '';
  const cover  = first.dataset.cover  || '';
  const genre  = first.dataset.genre  || '';
  const folder = first.dataset.folder || '';

  document.getElementById('heroTitle').textContent  = title;
  document.getElementById('heroGenre').textContent  = genre;
  document.getElementById('heroCover').src          = cover;
  document.getElementById('heroBg').style.backgroundImage = `url('${cover}')`;
  document.getElementById('heroBtn').onclick = () =>
    window.location.href = `reader.html?folder=${encodeURIComponent(folder)}&title=${encodeURIComponent(title)}`;
}

// ── GENRE CHIPS ──────────────────────────────────────
function buildGenreChips(genres) {
  const bar = document.getElementById('genreBar');
  const allChip = bar.querySelector('[data-genre="all"]');
  bar.innerHTML = '';
  bar.appendChild(allChip);
  genres.forEach(g => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.genre = g;
    chip.textContent = g;
    chip.onclick = () => filterGenre(chip);
    bar.appendChild(chip);
  });
}

// ── FILTRES ──────────────────────────────────────────
let activeGenre = 'all';

function filterGenre(el) {
  activeGenre = el.dataset.genre;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  let visible = 0;
  document.querySelectorAll('.book-card').forEach(card => {
    const titleMatch = (card.dataset.title || '').toLowerCase().includes(q);
    const genreMatch = activeGenre === 'all' || card.dataset.genre === activeGenre;
    const show = titleMatch && genreMatch;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  updateCount(visible);
}

function updateCount(n) {
  const total = n !== undefined ? n : document.querySelectorAll('.book-card').length;
  document.getElementById('bookCount').textContent = `${total} titre${total > 1 ? 's' : ''}`;
}

// ── INIT ─────────────────────────────────────────────
buildCards();
</script>
</body>
</html>
